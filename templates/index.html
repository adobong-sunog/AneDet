<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anemia Screening System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f7f6; padding: 20px; }
        .container { background: white; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        
        /* Video Area */
        .video-box { border: 3px solid #34495e; border-radius: 10px; overflow: hidden; margin: 20px 0; background: #000; min-height: 200px;}
        img { width: 100%; display: block; }
        
        /* Upload Area */
        .upload-section { margin-top: 20px; padding: 20px; border: 2px dashed #bdc3c7; border-radius: 10px; background: #fafafa; }
        .upload-btn { background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; }
        .upload-btn:hover { background: #2980b9; }

        /* Results */
        .result-card { margin-top: 20px; padding: 15px; border-radius: 15px; background: #ecf0f1; }
        .value { font-size: 4em; font-weight: 800; color: #2c3e50; }
        .unit { font-size: 1.5em; color: #7f8c8d; }
        .status-badge { font-size: 1.4em; font-weight: bold; padding: 8px 20px; border-radius: 50px; color: white; display: inline-block; }
        
        .normal { background: #27ae60; }
        .mild { background: #f39c12; }
        .severe { background: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Anemia Detection AI</h1>
        <p>Live Camera & Image Upload</p>

        <div class="video-box">
            <img src="{{ url_for('video_feed') }}" onerror="this.style.display='none'; document.getElementById('cam-error').style.display='block'">
            <div id="cam-error" style="display:none; color:white; padding:40px;">📷 Camera Not Detected<br>Use Upload Below</div>
        </div>

        <div class="upload-section">
            <p>No camera? Upload a nail photo:</p>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Select Image</button>
        </div>

        <div class="result-card">
            <div>Hemoglobin Level</div>
            <div>
                <span class="value" id="hb_val">--</span>
                <span class="unit">g/dL</span>
            </div>
            <div id="status_badge" class="status-badge normal" style="opacity: 0;">Ready</div>
        </div>
    </div>

    <script>
        // HANDLE UPLOAD
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            // Show loading state
            document.getElementById('hb_val').innerText = "...";
            document.getElementById('status_badge').style.opacity = '1';
            document.getElementById('status_badge').innerText = "Processing...";
            document.getElementById('status_badge').className = "status-badge mild";

            fetch('/upload', { method: 'POST', body: formData })
            .then(response => response.json())
            .then(data => {
                updateUI(data.hb, data.status);
            });
        });

        // POLLING FOR CAMERA (Optional if using upload)
        setInterval(function() {
            // Only poll if we aren't actively uploading
            fetch('/get_result')
            .then(res => res.json())
            .then(data => {
                // If the camera is running, it will send data > 0
                if(data.hb > 0) updateUI(data.hb, data.status);
            });
        }, 1000);

        function updateUI(hb, status) {
            document.getElementById('hb_val').innerText = hb;
            const badge = document.getElementById('status_badge');
            badge.style.opacity = '1';
            badge.innerText = status;
            
            badge.className = "status-badge"; // reset
            if(status.includes("Severe")) badge.classList.add("severe");
            else if(status.includes("Mild") || status.includes("Moderate")) badge.classList.add("mild");
            else badge.classList.add("normal");
        }
    </script>
</body>
</html>
